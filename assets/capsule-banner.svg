<svg width="1600" height="360" viewBox="0 0 1600 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="360">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="50%" stop-color="#11111B"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>

    <linearGradient id="capsule" x1="70" y1="40" x2="1530" y2="320">
      <stop offset="0%" stop-color="#11111B"/>
      <stop offset="55%" stop-color="#181825"/>
      <stop offset="100%" stop-color="#1E1E2E"/>
    </linearGradient>

    <linearGradient id="fluid" x1="120" y1="40" x2="1480" y2="320">
      <stop offset="0%" stop-color="#89B4FA">
        <animate attributeName="stop-color" values="#89B4FA;#CBA6F7;#F5C2E7;#89B4FA" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#CBA6F7">
        <animate attributeName="stop-color" values="#CBA6F7;#F5C2E7;#89DCEB;#CBA6F7" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F38BA8">
        <animate attributeName="stop-color" values="#F38BA8;#FAB387;#89B4FA;#F38BA8" dur="11s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="scan" x1="0" y1="0" x2="1600" y2="0">
      <stop offset="0%" stop-color="#89B4FA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#CBA6F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F38BA8" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-25%" y="-35%" width="150%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#CDD6F4" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.85"/>
    </filter>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect x="70" y="38" width="1460" height="282" rx="78"/>
    </clipPath>
  </defs>

  <style>
    .mono {
      font-family: "Fira Code", "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace;
    }

    .title {
      font-size: 74px;
      font-weight: 900;
      letter-spacing: 17px;
      fill: #F5F7FF;
    }

    .subtitle {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 6px;
      fill: #E6E9FF;
    }

    .term {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 2px;
      fill: #CDD6F4;
    }

    .muted { fill: #A6ADC8; }
    .ok { fill: #A6E3A1; }
    .accent { fill: #CBA6F7; }

    .scan {
      animation: scanMove 6s ease-in-out infinite;
    }

    .floatA {
      animation: floatA 13s ease-in-out infinite;
      transform-origin: center;
    }

    .floatB {
      animation: floatB 16s ease-in-out infinite;
      transform-origin: center;
    }

    .blink {
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes scanMove {
      0% { transform: translateX(-1250px); opacity: 0; }
      18% { opacity: 1; }
      60% { opacity: 1; }
      100% { transform: translateX(1250px); opacity: 0; }
    }

    @keyframes floatA {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(28px, -14px) scale(1.04); }
    }

    @keyframes floatB {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-26px, 20px) scale(1.06); }
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .scan, .floatA, .floatB, .blink {
        animation: none;
      }
    }
  </style>

  <rect width="1600" height="360" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <rect x="70" y="38" width="1460" height="282" rx="78" fill="url(#capsule)"/>

    <path class="floatB" opacity="0.32" filter="url(#soft)" fill="#89DCEB">
      <animate attributeName="d" dur="16s" repeatCount="indefinite"
        values="
        M70 93 C260 55 430 74 600 62 C800 47 960 90 1130 72 C1300 52 1420 58 1530 88 L1530 38 L70 38 Z;
        M70 88 C260 78 420 40 610 75 C800 112 965 48 1140 68 C1310 88 1425 44 1530 75 L1530 38 L70 38 Z;
        M70 100 C250 60 440 95 610 58 C810 20 970 95 1140 75 C1310 55 1420 82 1530 62 L1530 38 L70 38 Z;
        M70 93 C260 55 430 74 600 62 C800 47 960 90 1130 72 C1300 52 1420 58 1530 88 L1530 38 L70 38 Z
        "/>
    </path>

    <path class="floatA" opacity="0.28" filter="url(#soft)" fill="url(#fluid)">
      <animate attributeName="d" dur="13s" repeatCount="indefinite"
        values="
        M70 245 C260 180 410 170 570 195 C730 220 840 135 1010 160 C1190 185 1300 245 1530 180 L1530 320 L70 320 Z;
        M70 225 C260 145 430 220 585 178 C760 125 860 225 1035 205 C1210 182 1325 128 1530 218 L1530 320 L70 320 Z;
        M70 252 C260 210 410 130 600 168 C780 205 870 265 1045 190 C1225 115 1345 235 1530 175 L1530 320 L70 320 Z;
        M70 245 C260 180 410 170 570 195 C730 220 840 135 1010 160 C1190 185 1300 245 1530 180 L1530 320 L70 320 Z
        "/>
    </path>

    <g opacity="0.1">
      <path d="M135 100H1465" stroke="#CDD6F4"/>
      <path d="M135 150H1465" stroke="#CDD6F4"/>
      <path d="M135 200H1465" stroke="#CDD6F4"/>
      <path d="M135 250H1465" stroke="#CDD6F4"/>
    </g>

    <rect class="scan" x="70" y="38" width="300" height="282" fill="url(#scan)" opacity="0.45"/>
  </g>

  <rect x="70" y="38" width="1460" height="282" rx="78" fill="none" stroke="#45475A" stroke-width="2"/>
  <rect x="98" y="62" width="1404" height="234" rx="58" fill="none" stroke="#CBA6F7" stroke-opacity="0.23" stroke-width="2"/>

  <rect x="250" y="105" width="1100" height="120" rx="28" fill="#0B0F17" fill-opacity="0.62" stroke="#CDD6F4" stroke-opacity="0.08"/>

  <g class="mono" filter="url(#glow)">
    <text x="800" y="167" text-anchor="middle" class="title">ZARAK HASSAN</text>
    <text x="800" y="212" text-anchor="middle" class="subtitle">GRC · CUSTOMER ENGINEERING · BUILDER</text>
  </g>

  <g class="mono">
    <text x="170" y="277" class="term">
      <tspan fill="#89B4FA">&gt;</tspan>
      <tspan dx="14" class="muted">init_zarak_os</tspan>
      <tspan dx="22" class="ok">[OK]</tspan>
      <tspan dx="18" class="blink">█</tspan>
    </text>

    <text x="1430" y="277" text-anchor="end" class="term" opacity="0.92">
      <tspan class="accent">ISO 27001</tspan>
      <tspan class="muted"> · SOC 2 · VENDOR RISK · AI TOOLS</tspan>
    </text>
  </g>

  <g opacity="0.9">
    <circle cx="145" cy="82" r="4" fill="#A6E3A1">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="82" r="4" fill="#F9E2AF">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="82" r="4" fill="#F38BA8">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
